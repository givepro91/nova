name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bash tests/inc15-verify.sh
      - run: bash tests/gate-verify.sh
      - run: bash tests/worklog-verify.sh
